<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Truco Anotador</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>

<div class="tablero">

  <div class="lado" id="nosotros">
    <h2>Nosotros</h2>
    <div class="zona" id="nosotros-buenas"></div>
    <div class="zona" id="nosotros-malas"></div>

  </div>

  

  <div class="centro">
    <h1>30</h1>
    <button onclick="reiniciar()">Reiniciar</button>
  </div>

  <div class="lado" id="ellos">
    <h2>Ellos</h2>
    <div class="zona" id="ellos-buenas"></div>
    <div class="zona" id="ellos-malas"></div>

  </div>

</div>

<script src="app.js"></script>

<audio id="sonidoFosforo" src="sonidos/fosforo.mp3"></audio>

  <div class="firulete"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
</html>
